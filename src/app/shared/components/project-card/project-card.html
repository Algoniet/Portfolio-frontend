<div class="project-card">

  <div class="card-banner">
    <div class="banner-glow"></div>
    <div class="banner-lines">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <h3 class="project-title">{{ title }}</h3>
  </div>

  <div class="project-details">
    <p class="project-description">{{ description }}</p>

    <div class="project-techs">
      <div class="tech-grid">
        @for (tech of technologyIcons; track tech.name) {
          <div class="tech-item">
            <i class="tech-icon {{ tech.icon }}"></i>
            <span class="tech-name">{{ tech.name }}</span>
          </div>
        }
      </div>
    </div>

    <div class="project-links">
      @if (liveDemoUrl) {
        <a [href]="liveDemoUrl" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
          {{ 'PROJECTS.DEMO' | translate }} <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>
      }
      @if (githubUrl) {
        <a [href]="githubUrl" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">
          GitHub <i class="fa-brands fa-github"></i>
        </a>
      }
    </div>
  </div>
</div>
