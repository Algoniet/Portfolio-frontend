  <div class="project-details">
    <h3 class="project-title">{{ title }}</h3>
    <p class="project-description">{{ description }}</p>

    <div class="project-techs">
      <div class="tech-grid">
        @for (tech of technologyIcons; track tech.name) {
          <div class="tech-item">
            @if (tech.icon.startsWith('devicon')) {
              <i class="tech-icon devicon {{ tech.icon }}"></i>
            } @else {
              <i class="tech-icon {{ tech.icon }}"></i>
            }
            <span class="tech-name">{{ tech.name }}</span>
          </div>
        }
      </div>
    </div>

    <div class="project-links">
      <a *ngIf="liveDemoUrl" [href]="liveDemoUrl" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
        {{ 'PROJECTS.DEMO' | translate }} <i class="fa-solid fa-arrow-up-right-from-square"></i>
      </a>
      <a *ngIf="githubUrl" [href]="githubUrl" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">
        GitHub <i class="fa-brands fa-github"></i>
      </a>
    </div>
  </div>
</div>
