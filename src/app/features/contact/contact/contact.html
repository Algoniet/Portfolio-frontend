<!-- src/app/pages/contact/contact.component.html -->

<section class="contact-section">
  <div class="container">
    <h2 class="section-title">Contáctame</h2>
    <p class="section-description">
      ¿Tienes un proyecto en mente, una pregunta o simplemente quieres saludar? ¡No dudes en contactarme!
    </p>

    <!-- Añadir (ngSubmit) y [formGroup] o [(ngModel)] a los inputs -->
    <form class="contact-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" [(ngModel)]="contactForm.name" required placeholder="Tu Nombre">
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" [(ngModel)]="contactForm.email" required placeholder="alvarogn1297@ejemplo.com">
      </div>

      <div class="form-group">
        <label for="message">Mensaje:</label>
        <textarea id="message" name="message" rows="6" [(ngModel)]="contactForm.message" required placeholder="Escribe aquí tu mensaje..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Enviando...' : 'Enviar Mensaje' }}
      </button>

      <!-- Mensaje de éxito/error -->
      @if (submitMessage) {
        <p [class.success-message]="isSuccess" [class.error-message]="!isSuccess">{{ submitMessage }}</p>
      }
    </form>

    <div class="social-links">
      <p>También puedes encontrarme en:</p>
      <div class="social-icons-group">
        <a href="https://linkedin.com/in/tuperfil" target="_blank" rel="noopener noreferrer" class="social-icon">
          <i class="fa-brands fa-linkedin-in"></i>
        </a>
        <a href="https://github.com/tuperfil" target="_blank" rel="noopener noreferrer" class="social-icon">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>
  </div>
</section>
