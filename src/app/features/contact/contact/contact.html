<section class="contact-section">
  <div class="container">
    <h2 class="section-title">Contáctame</h2>
    <p class="section-description">
      ¿Tienes un proyecto en mente, una pregunta o simplemente quieres saludar? ¡No dudes en contactarme!
    </p>

    <form class="contact-form">
      <div class="form-group">
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required placeholder="Tu Nombre">
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="alvarogn1297@ejemplo.com">
      </div>

      <div class="form-group">
        <label for="message">Mensaje:</label>
        <textarea id="message" name="message" rows="6" required placeholder="Escribe aquí tu mensaje..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Enviar Mensaje</button>
    </form>

    <div class="social-links">
      <p>También puedes encontrarme en:</p>
      <div class="social-icons-group">
        <a href="https://linkedin.com/in/tuperfil" target="_blank" rel="noopener noreferrer" class="social-icon">
          <i class="fa-brands fa-linkedin-in"></i>
        </a>
        <a href="https://github.com/tuperfil" target="_blank" rel="noopener noreferrer" class="social-icon">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>
  </div>
</section>
