@if (isOpen) {
  <div class="contact-modal-overlay" (click)="closeModal()">
    <div class="contact-modal" (click)="$event.stopPropagation()">
      <button class="close-button" (click)="closeModal()" [attr.aria-label]="'CONTACT.TITLE' | translate">
        <i class="fa-solid fa-times"></i>
      </button>

      <div class="modal-content">
        <h2 class="section-title">{{ 'CONTACT.TITLE' | translate }}</h2>
        <p class="section-description">{{ 'CONTACT.DESCRIPTION' | translate }}</p>

        <form class="contact-form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="contact-name">{{ 'CONTACT.NAME_LABEL' | translate }}</label>
            <input
              type="text"
              id="contact-name"
              name="name"
              [(ngModel)]="contactForm.name"
              required
              [placeholder]="'CONTACT.NAME_PLACEHOLDER' | translate"
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label for="contact-email">{{ 'CONTACT.EMAIL_LABEL' | translate }}</label>
            <input
              type="email"
              id="contact-email"
              name="email"
              [(ngModel)]="contactForm.email"
              required
              placeholder="ejemplo@ejemplo.com"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="contact-message">{{ 'CONTACT.MESSAGE_LABEL' | translate }}</label>
            <textarea
              id="contact-message"
              name="message"
              rows="5"
              [(ngModel)]="contactForm.message"
              required
              [placeholder]="'CONTACT.MESSAGE_PLACEHOLDER' | translate"
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
            {{ isSubmitting ? ('CONTACT.SENDING' | translate) : ('CONTACT.SEND_BUTTON' | translate) }}
          </button>

          @if (submitMessage) {
            <p [class.success-message]="isSuccess" [class.error-message]="!isSuccess">
              {{ submitMessage }}
            </p>
          }
        </form>

        <div class="social-links">
          <p>{{ 'CONTACT.SOCIAL_TEXT' | translate }}</p>
          <div class="social-icons-group">
            <a
              href="https://linkedin.com/in/alvaro-gn/"
              target="_blank"
              rel="noopener noreferrer"
              class="social-icon"
            >
              <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a
              href="https://github.com/Algoniet"
              target="_blank"
              rel="noopener noreferrer"
              class="social-icon"
            >
              <i class="fa-brands fa-github"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
}
